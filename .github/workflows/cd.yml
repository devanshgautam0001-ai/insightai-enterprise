name: CD - Production Continuous Deployment

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    name: Build Docker Images and Trigger Enterprise Deployment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up QEMU for Multi-Platform Builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Backend Image
      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Frontend Image
      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trigger Deployments (Example patterns for Render, Railway, Vercel)
      - name: Trigger Railway/Render/Vercel Deployments
        run: |
          echo "Docker images successfully pushed to GitHub Container Registry."
          echo "Triggering cloud orchestration webhooks..."
          # Example webhook triggers:
          # curl -X POST ${{ secrets.RENDER_DEPLOY_WEBHOOK_URL }}
          # curl -X POST ${{ secrets.RAILWAY_DEPLOY_WEBHOOK_URL }}
